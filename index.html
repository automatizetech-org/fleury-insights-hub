<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard Fleury</title>
    <link rel="icon" href="/logo.png" type="image/png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Dashboard Fleury" />
    <link rel="apple-touch-icon" href="/logo.png" />
    <meta name="description" content="Dashboard Fleury - Gestão e acompanhamento" />
    <meta name="author" content="Fleury" />

    <meta property="og:title" content="Dashboard Fleury" />
    <meta property="og:description" content="Dashboard Fleury - Gestão e acompanhamento" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/logo.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Dashboard Fleury" />
    <meta name="twitter:image" content="/logo.png" />
  </head>

  <body>
    <script>
      (function () {
        try {
          var stored = localStorage.getItem("theme");
          var isDark = stored !== "light";
          var root = document.documentElement;
          if (isDark) {
            root.classList.add("dark");
          } else {
            root.classList.remove("dark");
          }
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
